<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Modern Tech Indigo Gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <!-- Emerald Glow -->
    <filter id="emeraldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#10b981" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Modern Rounded Corner Base -->
  <rect width="512" height="512" rx="128" fill="url(#brandGrad)"/>

  <!-- Subtle Inner Grid Line details -->
  <rect x="20" y="20" width="472" height="472" rx="108" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.08"/>
  
  <!-- Sleek Modern Tech logo letter W -->
  <g transform="translate(106, 126)">
    <!-- Main W lines -->
    <path d="M 30 50 L 90 230 L 150 90 L 210 230 L 270 50" fill="none" stroke="#ffffff" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Compounding dot (Success Green) in top-right corner -->
    <circle cx="270" cy="50" r="16" fill="#10b981" filter="url(#emeraldGlow)"/>
  </g>
</svg>
